{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mkurator.fullname" . }}-manager
  labels:
    {{- include "mkurator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mkurator.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "mkurator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- if .Values.metrics.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mkurator.fullname" . }}-metrics-auth
  labels:
    {{- include "mkurator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mkurator.fullname" . }}-metrics-auth
subjects:
  - kind: ServiceAccount
    name: {{ include "mkurator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
