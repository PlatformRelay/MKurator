# SonarCloud — DISABLED. The repository now lives in the platformrelay GitHub org.
# To enable: set SONAR_TOKEN secret, set sonar.projectKey below, remove `if: false`.
name: SonarCloud

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sonarcloud:
    name: sonarcloud
    if: false
    runs-on: ubuntu-latest
    env:
      # SONAR_PROJECT_KEY: platformrelay_mkurator
      COVERAGE_MIN: "91"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/go-cache
        with:
          envtest: true
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.51.1
      - name: Unit tests and coverage
        run: task test:run
        env:
          CI: "true"
      - uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
